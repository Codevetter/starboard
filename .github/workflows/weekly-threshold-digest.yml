name: Weekly threshold digest

on:
  schedule:
    - cron: '30 9 * * 1'
  workflow_dispatch:
    inputs:
      days:
        description: Days to include in the digest
        required: false
        default: '7'

permissions:
  contents: read
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database schema
        run: pnpm db:migrate
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Generate digest
        run: pnpm --silent weekly:threshold-digest > digest.md
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          DIGEST_DAYS: ${{ github.event.inputs.days || '7' }}

      - name: Create GitHub issue
        run: |
          title="Starboard weekly repo digest - $(date -u +%Y-%m-%d)"
          existing_issue="$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "$title in:title" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$existing_issue" ]; then
            gh issue edit "$existing_issue" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body-file digest.md
            exit 0
          fi

          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "$title" \
            --body-file digest.md
        env:
          GH_TOKEN: ${{ github.token }}

      # Fail-closed: the script logs and skips when RESEND_API_KEY is unset.
      # Setup: `gh secret set RESEND_API_KEY`; optionally set the DIGEST_EMAIL_FROM
      # repo variable to a verified Resend sender.
      - name: Send weekly digest emails
        run: pnpm digest:send-emails
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL_FROM: ${{ vars.DIGEST_EMAIL_FROM }}
